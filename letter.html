<!DOCTYPE html>
<html>
<head>
<title>Letter</title>

<style>
body{
background:#0b0b1f;
color:white;
text-align:center;
font-family:Arial;
padding-top:100px;
}

.gift{
font-size:80px;
cursor:pointer;
}

#letter{
display:none;
background:white;
color:black;
padding:20px;
margin:20px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>🎁 Open Your Gift</h1>

<div class="gift" onclick="openGift()">🎁</div>

<div id="letter">
<h2>Happy Birthday ❤️</h2>
<p>Write your message here</p>
</div>

<a href="index.html">⬅ Back</a>

<script>
function openGift(){
document.getElementById("letter").style.display="block";
}
</script>

</body>
</html>
