<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- handwritten font -->
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#e6d8b8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:'Patrick Hand', cursive;
overflow:hidden;
}

/* vintage paper */
.paper{
background:#fdf6e3;
width:70%;
max-width:700px;
padding:40px;
border-radius:8px;
box-shadow:0 0 40px rgba(0,0,0,0.25);
color:#333;
line-height:1.9;
opacity:0;
animation:openPaper 2s ease forwards;
}

/* opening animation */
@keyframes openPaper{
from{transform:scale(0.8); opacity:0;}
to{transform:scale(1); opacity:1;}
}

/* title */
h1{
text-align:center;
}

/* text */
#text{
font-size:18px;
white-space:pre-line;
}

/* pen */
.pen{
position:fixed;
width:35px;
pointer-events:none;
}

/* final line */
.final{
opacity:0;
text-align:center;
margin-top:30px;
font-size:22px;
animation:fade 2s forwards;
animation-delay:12s;
}

/* signature */
.signature{
opacity:0;
text-align:right;
font-size:24px;
margin-top:20px;
animation:fade 2s forwards;
animation-delay:14s;
}

/* heart */
.heart{
opacity:0;
text-align:center;
font-size:28px;
animation:pop 1s ease forwards;
animation-delay:16s;
}

/* confetti */
.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
animation:fall 3s linear infinite;
}

/* animations */
@keyframes fade{
to{opacity:1;}
}

@keyframes pop{
0%{transform:scale(0);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}

/* subtle F1 glow */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(225,6,0,0.1), transparent 70%);
animation:pulse 4s infinite;
}

@keyframes pulse{
0%{opacity:0.3;}
50%{opacity:0.6;}
100%{opacity:0.3;}
}
</style>
</head>

<body>

<!-- 🎶 soft happy birthday vibe -->
<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
</audio>

<!-- 🏎️ faint F1 vibe -->
<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<div class="paper">

<h1>💌 For You</h1>

<p id="text"></p>

<div class="final">forever us.</div>
<div class="signature">— tishaa 💖</div>
<div class="heart">💖</div>

</div>

<!-- pen -->
<img class="pen" id="pen" src="https://cdn-icons-png.flaticon.com/512/1828/1828925.png">

<script>
let message = `Happy birthday…

It’s been like… what, five years? No… it’s going to be our sixth this year. And honestly, time just flew with you. My 9th and 10th grade? They were actually so insane, and you were the best part of it. I never thought we’d get this close… but now, I can’t even imagine things without you.

I don’t even know how to explain what this is… like, how did we even get here? One day we were just normal, and now you’re literally my person.

And now we’re going to different colleges… and I hate that. I’m actually going to miss you so much. Like really. The daily gossips, the random excitement when we see each other, the hugs (almost every single day), all those stupid, crazy conversations… everything.

We did everything together. Literally everything. Hyderabad, Nexus — our second home — where all the chaos happened. Good, bad, everything.

I LOVE YOU SO MUCHHH.  
we’ll always have this.`;

let i = 0;
let speed = 45; // SLOW WRITING

function typeWriter(){
if(i < message.length){
document.getElementById("text").innerHTML += message.charAt(i);
i++;

// move pen randomly slightly
let pen = document.getElementById("pen");
pen.style.top = (50 + Math.random()*10) + "%";
pen.style.left = (45 + Math.random()*20) + "%";

setTimeout(typeWriter, speed);
}else{
launchConfetti();
}
}

function launchConfetti(){
for(let i=0;i<60;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.backgroundColor=["#e10600","#ffcc00","#ffffff"][Math.floor(Math.random()*3)];
c.style.animationDuration=(Math.random()*2+2)+"s";
document.body.appendChild(c);
}
}

typeWriter();
</script>

</body>
</html>
