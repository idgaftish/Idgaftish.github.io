<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise 💖</title>

<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }

    #startScreen {
        position: absolute;
        width: 100%;
        height: 100%;
        background: black;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 28px;
        font-family: cursive;
        cursor: pointer;
        z-index: 10;
    }

    video {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        display: none;
    }

    #video1 {
        display: none;
    }

    #video2 {
        display: none;
    }
</style>
</head>

<body>

<!-- Click to Start -->
<div id="startScreen">Tap to open your surprise 💌</div>

<!-- Videos -->
<video id="video1" playsinline>
    <source src="video1.mp4" type="video/mp4">
</video>

<video id="video2" playsinline>
    <source src="video2.mp4" type="video/mp4">
</video>

<script>
    const startScreen = document.getElementById("startScreen");
    const video1 = document.getElementById("video1");
    const video2 = document.getElementById("video2");

    // Click to start (important for iPad autoplay)
    startScreen.addEventListener("click", () => {
        startScreen.style.display = "none";

        video1.style.display = "block";
        video1.muted = false;
        video1.play();

        // Try fullscreen
        if (video1.requestFullscreen) {
            video1.requestFullscreen();
        } else if (video1.webkitEnterFullscreen) {
            video1.webkitEnterFullscreen(); // iPad Safari
        }
    });

    // When video1 ends → play video2
    video1.onended = () => {
        video1.style.display = "none";
        video2.style.display = "block";
        video2.play();

        if (video2.requestFullscreen) {
            video2.requestFullscreen();
        } else if (video2.webkitEnterFullscreen) {
            video2.webkitEnterFullscreen();
        }
    };
</script>

</body>
</html>
