<!DOCTYPE html>
<html>
<head>
<title>Final Surprise</title>

<style>
body{
background:#0b0b1f;
color:white;
text-align:center;
font-family:Arial;
}

button{
padding:15px 25px;
font-size:18px;
background:#e10600;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
}

</style>

</head>

<body>

<h1>🎉 Final Surprise</h1>

<button onclick="confetti()">Click Me</button>

<br><br>

<a href="index.html">Back Home</a>

<script>

function confetti(){
for(let i=0;i<120;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["red","blue","white"][Math.floor(Math.random()*3)];
c.style.animation="fall 3s linear";
document.body.appendChild(c);
}
}

</script>

</body>
</html>
