<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
font-family:'Poppins';
overflow:hidden;
color:white;
}

/* NETFLIX INTRO */
.intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
}

.logo{
font-size:50px;
color:#e50914;
letter-spacing:8px;
animation:reveal 2s ease forwards;
}

@keyframes reveal{
0%{opacity:0; transform:scale(0.8);}
100%{opacity:1; transform:scale(1);}
}

/* video container */
.video-container{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
display:none;
background:black;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* fade */
.fade{
animation:fade 1s forwards;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div class="intro" id="intro">
<div class="logo">TISHAA STUDIOS</div>
</div>

<!-- 🎥 VIDEOS -->
<div class="video-container" id="videoBox">

<video id="vid1" muted playsinline>
<source src="video1.mp4" type="video/mp4">
</video>

<video id="vid2" muted playsinline style="display:none;">
<source src="video2.mp4" type="video/mp4">
</video>

</div>

<script>

/* start after intro */
setTimeout(()=>{
document.getElementById("intro").style.display="none";

let box = document.getElementById("videoBox");
box.style.display="block";
box.classList.add("fade");

let v1 = document.getElementById("vid1");
let v2 = document.getElementById("vid2");

/* PLAY FIRST VIDEO */
v1.play();

/* AFTER FIRST → SECOND */
v1.onended = function(){
v1.style.display="none";
v2.style.display="block";
v2.play();

/* AFTER SECOND → FINAL PAGE */
v2.onended = function(){
setTimeout(()=>{
window.location.href="final.html";
},1500);
};
};

},2500);

</script>

</body>
</html>
