
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:black;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* F1 lights */
.lights{
display:flex;
gap:15px;
}

.light{
width:30px;
height:30px;
border-radius:50%;
background:#300;
}

/* reveal image */
.reveal{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
display:none;
}

.reveal img{
width:100%;
height:100%;
object-fit:cover;
}

/* flash */
.flash{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
}
</style>
</head>

<body>

<div class="lights" id="lights">
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
</div>

<div class="flash" id="flash"></div>

<div class="reveal" id="reveal">
<img src="photo1.jpg">
</div>

<!-- whoosh -->
<audio id="whoosh">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9c2c6b1c8c.mp3">
</audio>

<script>
let lights = document.querySelectorAll(".light");
let whoosh = document.getElementById("whoosh");

/* turn lights red one by one */
let i = 0;
function startLights(){
if(i < lights.length){
lights[i].style.background="red";
i++;
setTimeout(startLights,600);
}else{
/* lights out */
setTimeout(()=>{
lights.forEach(l=>l.style.background="black");

/* whoosh */
whoosh.play();

/* flash */
let flash = document.getElementById("flash");
flash.style.opacity="1";
flash.style.transition="0.3s";

/* reveal image */
setTimeout(()=>{
flash.style.opacity="0";
document.getElementById("lights").style.display="none";
document.getElementById("reveal").style.display="block";
},300);

/* go to final */
setTimeout(()=>{
window.location.href="final.html";
},4000);

},800);
}
}

startLights();
</script>

</body>
</html>
