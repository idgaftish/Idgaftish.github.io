<!DOCTYPE html>
<html>
<head>
<title>Surprise</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

button{
padding:15px 25px;
font-size:18px;
background:#e10600;
color:white;
border:none;
border-radius:20px;
}

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
}
</style>
</head>

<body>

<h1>🎉 FINAL SURPRISE</h1>

<button onclick="boom()">CLICK</button>

<script>
function boom(){
for(let i=0;i<200;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["red","blue","white"][Math.floor(Math.random()*3)];
c.style.animation="fall 4s linear";
document.body.appendChild(c);
}
}
</script>

</body>
</html>
