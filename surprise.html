<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise 💖</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    font-family: cursive;
    cursor: pointer;
    z-index: 10;
}

video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    display: none;
}
</style>
</head>

<body>

<div id="startScreen">Tap to open your surprise 💌</div>

<video id="video1" controls playsinline>
    <source src="video1.mp4" type="video/mp4">
</video>

<video id="video2" controls playsinline>
    <source src="video2.mp4" type="video/mp4">
</video>

<script>
const start = document.getElementById("startScreen");
const v1 = document.getElementById("video1");
const v2 = document.getElementById("video2");

start.onclick = () => {
    start.style.display = "none";

    v1.style.display = "block";
    v1.play().catch(() => {
        alert("Tap the play button if it doesn’t start");
    });
};

v1.onended = () => {
    v1.style.display = "none";
    v2.style.display = "block";

    v2.play().catch(() => {
        alert("Tap play for next video");
    });
};
</script>

</body>
</html>
