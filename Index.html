<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>

body{
background: #0a0a23;
font-family: Arial;
text-align:center;
padding-top:80px;
color:white;
overflow:hidden;
}

h1{
font-size:55px;
color:#e10600;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:25px;
background:#e10600;
color:white;
cursor:pointer;
margin-top:25px;
}

button:hover{
background:#ff2b2b;
}

img{
width:280px;
border-radius:15px;
margin-top:20px;
}

#letter{
display:none;
background:#111;
padding:20px;
margin:30px auto;
width:70%;
border-radius:15px;
}

.heart{
position:fixed;
top:-10px;
color:#e10600;
font-size:18px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

</style>
</head>

<body>

<h1>🏁 Happy Birthday</h1>

<p>
I wanted to do something different this time,
so I made a small website just for you.
</p>

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/Red_Bull_Racing_logo.svg/1200px-Red_Bull_Racing_logo.svg.png">

<br>

<button onclick="openLetter()">Open Your Letter</button>

<div id="letter">
<h2>💌 A Message For You</h2>

<p>
Write your birthday message here.

You can edit this text later and make it
personal and meaningful.
</p>

</div>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<script>

function openLetter(){
document.getElementById("letter").style.display="block";
}

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*4+3)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,1200);

</script>

</body>
</html>
