<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#0b0b1f;
color:white;
font-family:'Poppins';
text-align:center;
}

/* title */
h1{
margin-top:20px;
color:#e10600;
}

/* grid */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:20px;
padding:20px;
}

/* heart shape */
.photo{
width:120px;
height:120px;
position:relative;
margin:auto;
transform:rotate(-45deg);
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
}

/* heart circles */
.photo::before,
.photo::after{
content:"";
position:absolute;
width:120px;
height:120px;
background:inherit;
border-radius:50%;
}

.photo::before{
top:-60px;
left:0;
}

.photo::after{
left:60px;
top:0;
}

/* glow */
.photo{
background:#111;
box-shadow:0 0 15px rgba(225,6,0,0.5);
transition:0.4s;
}

.photo:hover{
transform:rotate(-45deg) scale(1.1);
box-shadow:0 0 25px red;
}
</style>
</head>

<body>

<h1>💖 Our Memories</h1>

<div class="gallery">

<div class="photo"><img src="photo1.jpg"></div>
<div class="photo"><img src="photo2.jpg"></div>
<div class="photo"><img src="photo3.jpg"></div>
<div class="photo"><img src="photo4.jpg"></div>
<div class="photo"><img src="photo5.jpg"></div>
<div class="photo"><img src="photo6.jpg"></div>
<div class="photo"><img src="photo7.jpg"></div>
<div class="photo"><img src="photo8.jpg"></div>
<div class="photo"><img src="photo9.jpg"></div>
<div class="photo"><img src="photo10.jpg"></div>
<div class="photo"><img src="photo11.jpg"></div>
<div class="photo"><img src="photo12.jpg"></div>
<div class="photo"><img src="photo13.jpg"></div>
<div class="photo"><img src="photo14.jpg"></div>
<div class="photo"><img src="photo15.jpg"></div>

</div>

</body>
</html>
