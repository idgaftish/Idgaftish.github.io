<!DOCTYPE html>
<html>
<head>
<title>Our Memories</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#02020a,#0b0b1f,#000);
color:white;
text-align:center;
overflow-x:hidden;
}

/* Animated background glow */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle, rgba(225,6,0,0.15), transparent 60%);
animation:moveBg 10s linear infinite;
z-index:-1;
}

@keyframes moveBg{
0%{transform:translate(-20%,-20%);}
50%{transform:translate(20%,20%);}
100%{transform:translate(-20%,-20%);}
}

/* Title */
h1{
padding:30px;
color:#e10600;
font-size:50px;
letter-spacing:2px;
}

/* Gallery grid */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

/* Images */
.gallery img{
width:100%;
border-radius:15px;
box-shadow:0 0 15px rgba(225,6,0,0.6);
cursor:pointer;
transition:0.4s;
}

/* Hover */
.gallery img:hover{
transform:scale(1.08);
box-shadow:0 0 30px rgba(0, 89, 255, 0.9);
}

/* Fullscreen viewer */
#viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
}

#viewer img{
max-width:90%;
max-height:90%;
border-radius:15px;
box-shadow:0 0 30px white;
}

/* Close button */
#viewer span{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}

/* Back button */
a{
display:inline-block;
margin:30px;
padding:12px 25px;
background:#e10600;
color:white;
text-decoration:none;
border-radius:20px;
font-size:18px;
}

</style>

</head>

<body>

<h1>🏁 Our Memories 📸</h1>

<div class="gallery">

<img src="photo1.jpg" onclick="openImg(this)">
<img src="photo2.jpg" onclick="openImg(this)">
<img src="photo3.jpg" onclick="openImg(this)">
<img src="photo4.jpg" onclick="openImg(this)">
<img src="photo5.jpg" onclick="openImg(this)">
<img src="photo6.jpg" onclick="openImg(this)">
<img src="photo7.jpg" onclick="openImg(this)">
<img src="photo8.jpg" onclick="openImg(this)">
<img src="photo9.jpg" onclick="openImg(this)">
<img src="photo10.jpg" onclick="openImg(this)">
<img src="photo11.jpg" onclick="openImg(this)">

</div>

<div id="viewer">
<span onclick="closeImg()">✖</span>
<img id="fullImg">
</div>

<a href="index.html">⬅ Back Home</a>

<script>
function openImg(img){
document.getElementById("viewer").style.display="flex";
document.getElementById("fullImg").src=img.src;
}

function closeImg(){
document.getElementById("viewer").style.display="none";
}
</script>

</body>
</html>
