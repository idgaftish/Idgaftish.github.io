<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#0b0b1f;
color:white;
font-family:'Poppins';
text-align:center;
}

/* title */
h1{
margin-top:20px;
color:#e10600;
}

/* slideshow container */
.slideshow{
position:relative;
max-width:90%;
margin:auto;
margin-top:30px;
}

/* images */
.slide{
display:none;
}

.slide img{
width:100%;
border-radius:15px;
box-shadow:0 0 30px rgba(225,6,0,0.5);
}

/* fade animation */
.fade{
animation:fade 1.5s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

/* dots */
.dots{
text-align:center;
margin-top:10px;
}

.dot{
height:10px;
width:10px;
margin:5px;
background:#555;
border-radius:50%;
display:inline-block;
}

.active{
background:#e10600;
}
</style>
</head>

<body>

<h1>💖 Our Memories</h1>

<!-- 🎵 MUSIC -->
<audio autoplay loop>
<source src="love.mp3">
</audio>

<div class="slideshow">

<div class="slide fade"><img src="photo1.jpg"></div>
<div class="slide fade"><img src="photo2.jpg"></div>
<div class="slide fade"><img src="photo3.jpg"></div>
<div class="slide fade"><img src="photo4.jpg"></div>
<div class="slide fade"><img src="photo5.jpg"></div>
<div class="slide fade"><img src="photo6.jpg"></div>
<div class="slide fade"><img src="photo7.jpg"></div>
<div class="slide fade"><img src="photo8.jpg"></div>
<div class="slide fade"><img src="photo9.jpg"></div>
<div class="slide fade"><img src="photo10.jpg"></div>
<div class="slide fade"><img src="photo11.jpg"></div>
<div class="slide fade"><img src="photo12.jpg"></div>
<div class="slide fade"><img src="photo13.jpg"></div>
<div class="slide fade"><img src="photo14.jpg"></div>
<div class="slide fade"><img src="photo15.jpg"></div>

</div>

<!-- dots -->
<div class="dots">
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

<script>
let slideIndex = 0;
let slides = document.getElementsByClassName("slide");

function showSlides(){
for(let i=0;i<slides.length;i++){
slides[i].style.display="none";
}

slideIndex++;
if(slideIndex > slides.length){slideIndex = 1;}

slides[slideIndex-1].style.display="block";

setTimeout(showSlides,2500);
}

showSlides();
</script>

</body>
</html>
