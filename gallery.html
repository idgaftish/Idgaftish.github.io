<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:linear-gradient(to bottom,#0b0b1f,#1a1a40);
color:white;
font-family:'Poppins';
text-align:center;
}

/* heading */
h1{
margin-top:20px;
color:#e10600;
}

/* 60% size */
.slideshow{
position:relative;
width:60%;
max-width:550px;
margin:auto;
margin-top:40px;
}

/* slides */
.slide{
display:none;
}

.slide img{
width:100%;
border-radius:15px;
box-shadow:0 0 25px rgba(225,6,0,0.6);
}

/* fade */
.fade{
animation:fade 1.2s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

/* ending text */
.end-text{
display:none;
margin-top:40px;
font-size:22px;
color:#e10600;
animation:fade 2s;
}
</style>
</head>

<body>

<h1>💖 Our Memories</h1>

<!-- 🎶 MUSIC -->
<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3">
</audio>

<div class="slideshow">

<div class="slide fade"><img src="photo1.jpg"></div>
<div class="slide fade"><img src="photo2.jpg"></div>
<div class="slide fade"><img src="photo3.jpg"></div>
<div class="slide fade"><img src="photo4.jpg"></div>
<div class="slide fade"><img src="photo5.jpg"></div>
<div class="slide fade"><img src="photo6.jpg"></div>
<div class="slide fade"><img src="photo7.jpg"></div>
<div class="slide fade"><img src="photo8.jpg"></div>
<div class="slide fade"><img src="photo9.jpg"></div>
<div class="slide fade"><img src="photo10.jpg"></div>
<div class="slide fade"><img src="photo11.jpg"></div>
<div class="slide fade"><img src="photo12.jpg"></div>
<div class="slide fade"><img src="photo13.jpg"></div>
<div class="slide fade"><img src="photo14.jpg"></div>
<div class="slide fade"><img src="photo15.jpg"></div>

</div>

<div class="end-text" id="endText">
💌 and now… something for you
</div>

<script>
let slideIndex = 0;
let slides = document.getElementsByClassName("slide");

function showSlides(){
if(slideIndex >= slides.length){

// show ending text
document.getElementById("endText").style.display = "block";

// go to letter page after 3 sec
setTimeout(function(){
window.location.href = "letter.html";
},3000);

return;
}

for(let i=0;i<slides.length;i++){
slides[i].style.display="none";
}

slides[slideIndex].style.display="block";
slideIndex++;

setTimeout(showSlides,2500);
}

showSlides();
</script>

</body>
</html>
