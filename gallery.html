<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>

<style>
body{
background:#050510;
color:white;
text-align:center;
font-family:Arial;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

img{
width:100%;
border-radius:15px;
transition:0.3s;
}

img:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<h1>Our Memories 📸</h1>

<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">
<img src="photo7.jpg">
<img src="photo8.jpg">
<img src="photo9.jpg">
<img src="photo10.jpg">
<img src="photo11.jpg">
</div>

<a href="index.html">⬅ Back</a>

</body>
</html>
