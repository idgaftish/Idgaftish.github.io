<!DOCTYPE html>
<html>
<head>
<title>🏁 For You</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Poppins';
text-align:center;
overflow:hidden;
}

/* BACKGROUND GLOW */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle, rgba(225,6,0,0.2), transparent);
animation:move 8s infinite linear;
z-index:-1;
}

@keyframes move{
0%{transform:translate(-20%,-20%);}
50%{transform:translate(20%,20%);}
100%{transform:translate(-20%,-20%);}
}

/* LIGHTS */
.lights{
display:flex;
justify-content:center;
margin-top:120px;
}

.light{
width:22px;
height:22px;
background:#200;
border-radius:50%;
margin:10px;
transition:0.3s;
}

.active{background:red;}
.go{background:lime;}

/* TITLE */
h1{
font-family:'Playfair Display';
font-size:55px;
margin-top:40px;
opacity:0;
transition:1s;
}

/* MENU */
.menu{
display:none;
margin-top:20px;
}

button{
padding:14px 28px;
margin:12px;
background:linear-gradient(45deg,#e10600,#ff3c3c);
border:none;
border-radius:30px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px red;
}

/* CAR */
.car{
position:fixed;
bottom:20px;
left:-250px;
width:160px;
animation:drive 3s linear infinite;
display:none;
}

@keyframes drive{
0%{left:-250px;}
100%{left:120%;}
}

/* SMOKE */
.smoke{
position:fixed;
bottom:0;
width:100%;
height:100px;
background:linear-gradient(to top, rgba(255,255,255,0.2), transparent);
opacity:0;
transition:1s;
}
</style>
</head>

<body>

<div class="lights">
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
</div>

<h1 id="title">🏁 Happy Birthday</h1>

<div class="menu">
<a href="story.html"><button>Our Story</button></a>
<a href="gallery.html"><button>Our Photos</button></a>
<a href="letter.html"><button>Open Letter</button></a>
<a href="surprise.html"><button>Final Surprise</button></a>
</div>

<img class="car" src="https://cdn-icons-png.flaticon.com/512/744/744465.png">

<div class="smoke" id="smoke"></div>

<!-- 🔊 SOUND -->
<audio id="engine">
<source src="f1.mp3">
</audio>

<script>
let lights = document.querySelectorAll(".light");
let i=0;

function startLights(){
if(i < lights.length){
lights[i].classList.add("active");
i++;
setTimeout(startLights,600);
}
else{
setTimeout(go,800);
}
}

function go(){
document.getElementById("engine").play();

lights.forEach(l=>l.classList.remove("active"));
lights.forEach(l=>l.classList.add("go"));

document.getElementById("title").style.opacity=1;
document.querySelector(".menu").style.display="block";
document.querySelector(".car").style.display="block";

document.getElementById("smoke").style.opacity=1;
}

/* START */
setTimeout(startLights,1000);

/* SECRET CLICK 😏 */
document.getElementById("title").onclick = function(){
alert("You found the secret 💖");
}
</script>

</body>
</html>
