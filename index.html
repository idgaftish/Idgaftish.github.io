<!DOCTYPE html>
<html>
<head>
<title>🏁 For You</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:black;
color:white;
font-family:'Poppins';
text-align:center;
overflow:hidden;
}

/* BACKGROUND GLOW */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle, rgba(225,6,0,0.25), transparent);
animation:move 6s infinite linear;
z-index:-1;
}

@keyframes move{
0%{transform:translate(-20%,-20%);}
50%{transform:translate(20%,20%);}
100%{transform:translate(-20%,-20%);}
}

/* LIGHTS */
.lights{
display:flex;
justify-content:center;
margin-top:120px;
}

.light{
width:24px;
height:24px;
background:#200;
border-radius:50%;
margin:10px;
transition:0.3s;
box-shadow:0 0 10px #300;
}

.active{
background:red;
box-shadow:0 0 20px red;
}

.go{
background:lime;
box-shadow:0 0 25px lime;
}

/* TITLE */
h1{
font-family:'Playfair Display';
font-size:55px;
margin-top:40px;
opacity:0;
transition:1s;
text-shadow:0 0 20px red;
}

/* MENU */
.menu{
display:none;
margin-top:20px;
}

button{
padding:14px 28px;
margin:12px;
background:linear-gradient(45deg,#e10600,#ff3c3c);
border:none;
border-radius:30px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px red;
}

/* REALISTIC F1 CAR */
.car{
position:fixed;
bottom:20px;
left:-300px;
width:220px;
animation:drive 2.5s linear infinite;
display:none;
filter:drop-shadow(0 0 10px red);
}

@keyframes drive{
0%{left:-300px;}
100%{left:120%;}
}

/* SMOKE */
.smoke{
position:fixed;
bottom:0;
width:100%;
height:120px;
background:linear-gradient(to top, rgba(255,255,255,0.25), transparent);
opacity:0;
transition:1s;
}

/* FLASH EFFECT */
.flash{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}
</style>
</head>

<body>

<div class="flash" id="flash"></div>

<div class="lights">
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
</div>

<h1 id="title">🏁 Happy Birthday</h1>

<div class="menu">
<a href="story.html"><button>Our Story</button></a>
<a href="gallery.html"><button>Our Photos</button></a>
<a href="letter.html"><button>Open Letter</button></a>
<a href="surprise.html"><button>Final Surprise</button></a>
</div>

<!-- BETTER F1 CAR IMAGE -->
<img class="car" src="https://upload.wikimedia.org/wikipedia/commons/3/33/Red_Bull_Racing_RB18_F1_Car.png">

<div class="smoke" id="smoke"></div>

<!-- 🔊 SOUND -->
<audio id="intro">
<source src="f1intro.mp3">
</audio>

<audio id="engine">
<source src="engine.mp3">
</audio>

<script>
let lights = document.querySelectorAll(".light");
let i=0;

function startLights(){
if(i < lights.length){
lights[i].classList.add("active");
i++;
setTimeout(startLights,500);
}
else{
setTimeout(go,700);
}
}

function go(){
/* PLAY F1 INTRO SOUND */
document.getElementById("intro").play();

/* FLASH LIKE LIGHTS OUT */
let flash = document.getElementById("flash");
flash.style.opacity = 1;
setTimeout(()=>{flash.style.opacity=0;},200);

/* CHANGE LIGHTS */
lights.forEach(l=>l.classList.remove("active"));
lights.forEach(l=>l.classList.add("go"));

/* SHOW STUFF */
document.getElementById("title").style.opacity=1;
document.querySelector(".menu").style.display="block";
document.querySelector(".car").style.display="block";
document.getElementById("smoke").style.opacity=1;

/* ENGINE SOUND AFTER INTRO */
setTimeout(()=>{
document.getElementById("engine").play();
},1500);
}

/* START */
setTimeout(startLights,1000);

/* SECRET CLICK 😏 */
document.getElementById("title").onclick = function(){
alert("Lights out and away we go 🏁💖");
}
</script>

</body>
</html>
